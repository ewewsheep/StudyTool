<!DOCTYPE html>
<head>
    <style>
        span{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        .basecontainer{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            flex-direction: column;
        }
        .basecontainergap{
            display: flex;
            justify-content: center;
            align-items: center;
            height:8em;
            gap:1em;
            width: 100%;
            flex-direction: column;
        }
    </style>
</head>

<body class="basecontainer">
    <div class="basecontainergap">
    <div class="basecontainergap" style="height:40vh">
        <span>codes:</span>
        <input type="text" id="arrayiput">
        <button onclick="Apply()">Apply</button>
        <button onclick="Reset()">Get Code</button>
    </div>
    <div class="basecontainergap">
        <span>question</span>
        <input type="text" id="addquestion">
        <span>question</span>
        <input type="text" id="addawnser">
        <span>add question</span>
        <button onclick="Add()">Add</button>
    </div>
    <div class="basecontainergap">
        <button onclick="Rand()">Get Question</button>
        <span id="question">-</span>
        <button onclick="Reveal()">reveal answer? (check if you got it right)</button>
        <span id="reveal"></span>
    </div>
    </div>
    

    <script>
        var current = null
        var array = []
        function Apply(){
            var i = document.getElementById("arrayiput").value
            var inp = JSON.parse(i)
            array = inp
        }
        function Reset(){
            document.getElementById("arrayiput").value = JSON.stringify(array)
        }
        function Add(){
            var acend = 0
            array.forEach(item => {
                acend++
            });

            acend + 1
            
            var a = document.getElementById("addquestion").value
            var b = document.getElementById("addawnser").value

            array[acend] = {
                "question":a,
                "answer":b
            }
        }
        function Rand(){
            var x = 0
            array.forEach(item => {
                x++
            });
            x + 1
            var ran = Math.floor(Math.random() * x)
            document.getElementById("question").innerText = array[ran].question

            var y = 0
            array.forEach(item => {
                if(item.answer == array[ran].answer){
                    current = y
                }
                y++
            });

            document.getElementById("reveal").innerText = ""
        }
        function Reveal(){
            document.getElementById("reveal").innerText = array[current].answer
        }
    </script>
</body>
